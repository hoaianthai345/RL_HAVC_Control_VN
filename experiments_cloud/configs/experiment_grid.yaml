project_name: eaai_hvac_edge_cloud
mode: dummy
output_dir: results/raw
summary_dir: results/summary
artifact_dir: artifacts
episode_steps: 288
seeds:
- 1
- 2
- 3
methods:
- static
- ashrae
- ppo_static
- ppo_multicontext
- edge_only
- cloud_only
- edge_cloud_adaptive
latency:
  repetitions: 1000
  warmup: 50
  cloud_delay_ms: 80
  edge_delay_ms: 0
training:
  total_timesteps: 500000
  learning_rate: 0.0005
  n_steps: 128
  batch_size: 128
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.15
policy_update:
  update_interval_steps: 96
  acceptance_metric: deployment_score
  max_comfort_regression: 0.02
  deployment_score_weights:
    energy_kwh: 1.0
    comfort_violation_rate: 8.0
    action_instability: 2.0
    p95_latency_ms_penalty_per_ms: 0.004
